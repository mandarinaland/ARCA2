<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Xat ARCA</title>
<style>
  body { font-family: sans-serif; background:#f5f5f5; padding:2em; }
  #chat { border:1px solid #ccc; padding:1em; height:300px; overflow-y:auto; background:#fff; }
  .user { color: #1a1a1a; margin: 5px 0; }
  .arca { color: #6a2eb9; margin: 5px 0; font-style: italic; }
  #message { width: 80%; }
</style>
</head>
<body>
<h2>ARCA — Veu poètica de Piath</h2>
<div id="chat"></div>
<input id="message" placeholder="Escriu el teu missatge..." />
<button onclick="sendMessage()">Enviar</button>

<script>
async function sendMessage() {
  const messageInput = document.getElementById("message");
  const message = messageInput.value.trim();
  if (!message) return;

  appendMessage("user", message);
  messageInput.value = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });
    const data = await res.json();
    appendMessage("arca", data.reply);
  } catch (err) {
    appendMessage("arca", "ARCA no pot parlar ara; prova més tard.");
    console.error(err);
  }
}

function appendMessage(role, text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
